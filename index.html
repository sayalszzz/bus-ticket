<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городской транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: #000000;
            color: #d4d4d4;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .countdown {
            text-align: center;
            font-size: 21px;
            font-weight: 500;
            padding: 14px 0;
            background: #000000;
            color: #d4d4d4;
        }
        .countdown span {
            color: #d4d4d4;
            font-weight: 700;
        }
        .tabs {
            display: flex;
            background: #000000;
            border-bottom: 1px solid #222222;
        }
        .tab {
            flex: 1;
            padding: 13px 0;
            text-align: center;
            font-size: 15.5px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            color: #aaaaaa;
            position: relative;
        }
        .tab.active {
            color: #ff3b3b;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 11%;
            right: 11%;
            height: 3px;
            background: #ff3b3b;
        }
        .tab-number {
            font-weight: 600;
            color: #d4d4d4;
        }
        .tab.active .tab-number {
            color: #ff3b3b;
        }
        .content {
            padding: 0 16px;
            flex: 1;
        }
        .section {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid #222222;
        }
        .section:last-child { border-bottom: none; }

        .icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab .icon {
            width: 26px;
            height: 26px;
        }
        .tab svg {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            stroke-width: 1.5;
            fill: none;
        }
        .tab.active svg {
            stroke: #ff3b3b;
        }
        .section .icon {
            width: 36px;
            height: 36px;
        }
        /* Только автобус */
        .section .bus-icon {
            width: 42px;     /* например, делаем автобус больше */
            height: 42px;
        }
       .section .carrier-icon {
            width: 40px;   /* ← измени здесь размер */
            height: 40px;
        }

        .carrier-icon, .bus-icon, .ruble-icon,
        .calendar-icon, .clock-icon, .control-icon {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .carrier-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/carrier-icon.png'); }
        .bus-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/bus-icon.png'); }
        .ruble-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/ruble-icon.png'); }
        .calendar-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/calendar-icon.png'); }
        .clock-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/clock-icon.png'); }
        .control-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/control-icon.png'); }

        .carrier-icon,
        .bus-icon,
        .ruble-icon,
        .calendar-icon,
        .clock-icon,
        .control-icon {
            filter: brightness(1.8) contrast(0.6);
        }

        #address { color: #aaaaaa; }

        .label {
            font-size: 16px;
            font-weight: 400;
            color: #aaaaaa;
            margin-bottom: 4px;
        }
        .value, .plate {
            font-size: 21px;
            font-weight: 500;
            color: #d4d4d4;
        }
        .plate {
            font-size: 21px;
            font-weight: 600;
            margin-top: 3px;
        }

        .qr-screen { text-align: center; padding: 40px 20px 20px; }
        #qr-code {
            width: 260px;
            height: 260px;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
        }
        .red-btn {
            background: #e11b1c;
            color: #d4d4d4;
            border: none;
            font-size: 18px;
            font-weight: 700;
            padding: 16px;
            border-radius: 12px;
            margin: 40px 16px 30px 16px;
            width: calc(100% - 32px);
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- ... (остальная часть тела HTML и скрипт без изменений) -->
    <div id="main-container" class="container">
        <div class="countdown">Действует: <span id="seconds">15</span> сек.</div>
   
        <div class="tabs">
            <div class="tab active" id="tab-ticket">
                <span class="icon ticket-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </span>
                <span id="control-number" class="tab-number"></span>
            </div>
            <div class="tab" id="tab-control">
                <span class="icon control-icon"></span>
                Контроль
            </div>
        </div>

        <div id="content-ticket" class="content">
            <div class="section">
                <div class="icon carrier-icon"></div>
                <div style="flex:1">
                    <div class="label">Перевозчик</div>
                    <div class="value" id="carrier"></div>
                </div>
            </div>
            <div class="section">
                <div class="icon bus-icon"></div>
                <div style="flex:1">
                    <div id="address" class="value"></div>
                    <div id="plate" class="plate"></div>
                </div>
            </div>
            <div class="section">
                <div class="icon ruble-icon"></div>
                <div style="flex:1">
                    <div class="label">Стоимость</div>
                    <div id="cost" class="value"></div>
                </div>
            </div>
            <div class="section">
                <div class="icon calendar-icon"></div>
                <div style="flex:1">
                    <div class="label">Дата покупки</div>
                    <div id="purchase_date" class="value"></div>
                </div>
            </div>
            <div class="section">
                <div class="icon clock-icon"></div>
                <div style="flex:1">
                    <div class="label">Время покупки:</div>
                    <div id="purchase_time" class="value"></div>
                </div>
            </div>
        </div>

        <div id="content-control" class="content hidden">
            <div class="qr-screen">
                <p>Предъявите QR-код контролёру</p>
                <img id="qr-code" src="" alt="QR">
                <p style="margin-top:30px; color:#666;">Билет № <span id="qr-ticket-id"></span></p>
            </div>
        </div>
   
        <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
    </div>

    <script>
        // Скрипт без изменений (тот же, что был у тебя)
        const urlParams = new URLSearchParams(window.location.search);
        const TelegramWebApp = window.Telegram.WebApp;

        function checkExpiration() {
            const expireAt = urlParams.get('expire_at');
            if (expireAt) {
                const expireDate = new Date(expireAt);
                const now = new Date();
                if (now > expireDate) {
                    document.getElementById('main-container').innerHTML = `
                        <div class="expired-container">
                            <div class="expired-icon">⌛</div>
                            <div class="expired-title">Срок действия билета закончился</div>
                            <div class="expired-text">Билет был действителен до ${expireDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                            <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
                        </div>
                    `;
                    return true;
                }
            }
            return false;
        }

        function fillData() {
            document.getElementById('carrier').textContent = urlParams.get('carrier') || 'ИП Цугленок М М';
            let addr = (urlParams.get('address') || 'Автовокзал Восточный - Петрушина').replace('60, ', '');
            document.getElementById('address').textContent = addr;
            document.getElementById('plate').textContent = urlParams.get('plate') || 'е215тм124';
            const count = urlParams.get('count') || '1';
            const price = urlParams.get('total_price') || '48.00';
            document.getElementById('cost').innerHTML = `${count} шт., Полный, ${price} ₽`;
            document.getElementById('purchase_date').textContent = urlParams.get('purchase_date') || '15 апреля 2026 г.';
            document.getElementById('purchase_time').textContent = urlParams.get('purchase_time') || '12:00';
            const ticketId = urlParams.get('ticket_id') || '1 000 000 000';
            document.getElementById('control-number').textContent = ticketId;
            document.getElementById('qr-ticket-id').textContent = ticketId;
        }

        function startCountdown() {
            let seconds = 15;
            const el = document.getElementById('seconds');
            const timer = setInterval(() => {
                seconds--;
                if (el) el.textContent = seconds;
                if (seconds <= 0) clearInterval(timer);
            }, 1000);
        }

        function generateQR() {
            const ticketId = urlParams.get('ticket_id') || '1 000 000 000';
            const plate = urlParams.get('plate') || 'е215тм124';
            const data = ticketId + '|' + plate;
            document.getElementById('qr-code').src =
                `https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=000000&bgcolor=FFFFFF&data=${encodeURIComponent(data)}`;
        }

        function initTabs() {
            const t1 = document.getElementById('tab-ticket');
            const t2 = document.getElementById('tab-control');
            const c1 = document.getElementById('content-ticket');
            const c2 = document.getElementById('content-control');
         
            t1.addEventListener('click', () => {
                t1.classList.add('active');
                t2.classList.remove('active');
                c1.classList.remove('hidden');
                c2.classList.add('hidden');
            });
            t2.addEventListener('click', () => {
                t2.classList.add('active');
                t1.classList.remove('active');
                c2.classList.remove('hidden');
                c1.classList.add('hidden');
                generateQR();
            });
        }

        function init() {
            TelegramWebApp.ready();
            TelegramWebApp.expand();
            TelegramWebApp.setHeaderColor('#000000');
            TelegramWebApp.setBackgroundColor('#000000');
         
            if (!checkExpiration()) {
                fillData();
                startCountdown();
                initTabs();
            }
        }
        window.onload = init;
    </script>
</body>
</html>
