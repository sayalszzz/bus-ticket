<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городской транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Верхний таймер */
        .countdown {
            text-align: center;
            font-size: 19px;
            font-weight: 400;
            padding: 18px 0;
            letter-spacing: 0.3px;
        }

        /* Табы */
        .tabs {
            display: flex;
            border-bottom: 1.5px solid #1a1a1a;
        }
        .tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #757575;
            position: relative;
        }
        .tab.active {
            color: #e53935;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1.5px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e53935;
        }
        .tab-number {
            font-weight: 400;
            color: #e53935;
            font-size: 17px;
        }

        /* Основной контент */
        .content {
            padding: 0 16px;
            flex: 1;
        }
        .section {
            display: flex;
            align-items: flex-start;
            gap: 22px;
            padding: 14px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .icon {
            width: 26px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            padding-top: 4px;
        }
        .icon svg {
            width: 24px;
            height: 24px;
            stroke: #9e9e9e; /* Цвет иконок как на фото 2 */
        }

        .label {
            font-size: 13px;
            color: #8a8a8a;
            margin-bottom: 4px;
        }
        .value {
            font-size: 17px;
            font-weight: 400;
            color: #ffffff;
            line-height: 1.3;
        }
        .plate {
            font-size: 21px;
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* Кнопка */
        .red-btn {
            background: #e53935;
            color: white;
            border: none;
            font-size: 17px;
            font-weight: 600;
            padding: 18px;
            border-radius: 10px;
            margin: 30px 16px 20px 16px;
            width: calc(100% - 32px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="main-container" class="container">
        <div class="countdown">Действует: <span id="seconds">15</span> сек.</div>
     
        <div class="tabs">
            <div class="tab active" id="tab-ticket">
                <span class="icon" style="padding:0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                </span>
                <span id="control-number" class="tab-number"></span>
            </div>
            <div class="tab" id="tab-control">
                <span class="icon" style="padding:0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                Контроль
            </div>
        </div>

        <div id="content-ticket" class="content">
            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Перевозчик</div>
                    <div class="value" id="carrier"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="12" rx="2"/>
                        <path d="M6 21v-2M18 21v-2M4 11h16"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div id="address" class="value" style="color:#8a8a8a; font-size:15px;"></div>
                    <div id="plate" class="plate"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M11 15h2a3 3 0 1 0 0-6h-2v6zM11 9v10M9 15h6"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Стоимость</div>
                    <div id="cost" class="value"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Дата покупки</div>
                    <div id="purchase_date" class="value"></div>
                </div>
            </div>
           
            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Время покупки</div>
                    <div id="purchase_time" class="value"></div>
                </div>
            </div>
        </div>

        <div id="content-control" class="content hidden">
            <div style="text-align: center; padding: 40px 0;">
                <img id="qr-code" src="" alt="QR" style="width: 220px; background: white; padding: 10px; border-radius: 8px;">
            </div>
        </div>
     
        <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TelegramWebApp = window.Telegram.WebApp;
     
        function fillData() {
            document.getElementById('carrier').textContent = urlParams.get('carrier') || 'ООО "СТК"';
            document.getElementById('address').textContent = urlParams.get('address') || 'ул Цимлянская - ст Красноярск-Северный';
            document.getElementById('plate').textContent = urlParams.get('plate') || 'в583ск124';
         
            const count = urlParams.get('count') || '3';
            const price = urlParams.get('total_price') || '144.00';
            document.getElementById('cost').textContent = `${count} шт., Полный, ${price} ₽`;
         
            document.getElementById('purchase_date').textContent = urlParams.get('purchase_date') || '10 января 2026 г.';
            document.getElementById('purchase_time').textContent = urlParams.get('purchase_time') || '20:35';
         
            const ticketId = urlParams.get('ticket_id') || '1 670 582 072';
            document.getElementById('control-number').textContent = ticketId;
        }

        function startCountdown() {
            let seconds = 9;
            const el = document.getElementById('seconds');
            const timer = setInterval(() => {
                seconds--;
                if (el) el.textContent = seconds;
                if (seconds <= 0) clearInterval(timer);
            }, 1000);
        }

        function initTabs() {
            const t1 = document.getElementById('tab-ticket');
            const t2 = document.getElementById('tab-control');
            const c1 = document.getElementById('content-ticket');
            const c2 = document.getElementById('content-control');
           
            t1.onclick = () => {
                t1.classList.add('active'); t2.classList.remove('active');
                c1.classList.remove('hidden'); c2.classList.add('hidden');
            };
            t2.onclick = () => {
                t2.classList.add('active'); t1.classList.remove('active');
                c2.classList.remove('hidden'); c1.classList.add('hidden');
                const ticketId = urlParams.get('ticket_id') || '1670582072';
                document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${ticketId}`;
            };
        }

        window.onload = () => {
            TelegramWebApp.ready();
            TelegramWebApp.expand();
            fillData();
            startCountdown();
            initTabs();
        };
    </script>
</body>
</html>
