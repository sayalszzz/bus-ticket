<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Билет — Городской транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
        }
        .ticket {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        .header {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .info {
            margin: 14px 0;
            font-size: 16px;
        }
        .label {
            color: #aaaaaa;
            font-size: 14px;
        }
        .value {
            color: #ffffff;
            font-weight: 600;
        }
        .price {
            font-size: 26px;
            font-weight: bold;
            color: #ff4d4d;
            text-align: center;
            margin: 25px 0;
            padding: 12px 0;
        }
        .ticket-id {
            text-align: center;
            font-size: 17px;
            margin: 20px 0;
            color: #dddddd;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666666;
            font-size: 14px;
        }
        .red-btn {
            background: #ff3b3b;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="ticket">
        <div class="header">Билет на автобус</div>
        
        <div class="info"><span class="label">Перевозчик</span><br><span class="value" id="carrier"></span></div>
        <div class="info"><span class="label">Маршрут</span><br><span class="value" id="route"></span></div>
        <div class="info"><span class="label">Направление</span><br><span class="value" id="address"></span></div>
        <div class="info"><span class="label">Автобус</span><br><span class="value" id="plate"></span></div>
        
        <div class="price" id="price"></div>
        
        <div class="ticket-id">
            Билет № <span id="ticket_id" style="font-weight: bold; color:#ffffff;"></span>
        </div>
        
        <div class="info" style="text-align: center;">
            Действует до <span id="valid_until" class="value"></span>
        </div>

        <div class="footer">
            Предъявите контролёру
        </div>

        <button class="red-btn" onclick="Telegram.WebApp.close()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        document.getElementById('carrier').textContent = urlParams.get('carrier') || 'ИП Цугленок М М';
        document.getElementById('route').textContent = urlParams.get('route') || 'Маршрут №60';
        document.getElementById('address').textContent = urlParams.get('address') || '';
        document.getElementById('plate').textContent = urlParams.get('plate') || '';
        document.getElementById('price').textContent = (urlParams.get('total_price') || '48.00') + ' ₽';
        document.getElementById('ticket_id').textContent = urlParams.get('ticket_id') || '—';
        document.getElementById('valid_until').textContent = urlParams.get('valid_until') || '—';

        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor("#000000");
        Telegram.WebApp.setBackgroundColor("#000000");
    </script>
</body>
</html>
    </script>
</body>
</html>
