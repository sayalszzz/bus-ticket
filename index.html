<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городской транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: #000000;
            color: #d4d4d4;
            min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; background: #000; min-height: 100vh; display: flex; flex-direction: column; }
        .countdown { text-align: center; font-size: 21px; font-weight: 500; padding: 14px 0; background: #000000; color: #d4d4d4; }
        .countdown span { color: #d4d4d4; font-weight: 700; }

        .tabs { display: flex; background: #000000; border-bottom: 1px solid #222222; }
        .tab { flex: 1; padding: 13px 0; text-align: center; font-size: 15.5px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 7px; color: #aaaaaa; position: relative; }
        .tab.active { color: #ff3b3b; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 11%; right: 11%; height: 3px; background: #ff3b3b; }
        .tab-number { font-weight: 600; color: #d4d4d4; }
        .tab.active .tab-number { color: #ff3b3b; }

        .content { padding: 0 16px; flex: 1; }
        .section { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #222222; }
        .section:last-child { border-bottom: none; }

        .icon { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .tab .icon { width: 26px; height: 26px; }
        .tab svg { width: 24px; height: 24px; stroke: #ffffff; stroke-width: 1.5; fill: none; }
        .tab.active svg { stroke: #ff3b3b; }

        /* Общий размер для всех нижних иконок */
        .section .icon {
            width: 36px;
            height: 36px;
        }

        /* ==================== ИНДИВИДУАЛЬНЫЕ РАЗМЕРЫ ==================== */
        .carrier-icon { width: 40px; height: 40px; }   /* Перевозчик */
        .bus-icon      { width: 40px; height: 40px; }   /* Автобус */
        /* .ruble-icon    { width: 34px; height: 34px; } */
        /* .calendar-icon { width: 34px; height: 34px; } */
        /* .clock-icon    { width: 34px; height: 34px; } */

        .carrier-icon, .bus-icon, .ruble-icon,
        .calendar-icon, .clock-icon, .control-icon {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .carrier-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/carrier-icon.png'); }
        .bus-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/bus-icon.png'); }
        .ruble-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/ruble-icon.png'); }
        .calendar-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/calendar-icon.png'); }
        .clock-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/clock-icon.png'); }
        .control-icon { background-image: url('https://raw.githubusercontent.com/sayalszzz/bus-ticket/main/control-icon.png'); }

        .carrier-icon, .bus-icon, .ruble-icon,
        .calendar-icon, .clock-icon, .control-icon {
            filter: brightness(1.45) contrast(1.25);
        }

        #address { color: #aaaaaa; }
        .label { font-size: 16px; font-weight: 400; color: #aaaaaa; margin-bottom: 4px; }
        .value, .plate { font-size: 21px; font-weight: 500; color: #d4d4d4; }
        .plate { font-size: 21px; font-weight: 600; margin-top: 3px; }

        .red-btn {
            background: #e11b1c; color: #d4d4d4; border: none; font-size: 18px; font-weight: 700;
            padding: 16px; border-radius: 12px; margin: 40px 16px 30px 16px; width: calc(100% - 32px);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="main-container" class="container">
        <div class="countdown">Действует: <span id="seconds">15</span> сек.</div>
  
        <div class="tabs">
            <div class="tab active" id="tab-ticket">
                <span class="icon ticket-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </span>
                <span id="control-number" class="tab-number"></span>
            </div>
            <div class="tab" id="tab-control">
                <span class="icon control-icon"></span>
                Контроль
            </div>
        </div>

        <div id="content-ticket" class="content">
            <div class="section">
                <div class="icon carrier-icon"></div>
                <div style="flex:1">
                    <div class="label">Перевозчик</div>
                    <div class="value" id="carrier"></div>
                </div>
            </div>
            <div class="section">
                <div class="icon bus-icon"></div>
                <div style="flex:1">
                    <div id="address" class="value"></div>
                    <div id="plate" class="plate"></div>
                </div>
            </div>
            <!-- остальные секции без изменений -->
            <div class="section">
                <div class="icon ruble-icon"></div>
                <div style="flex:1">
                    <div class="label">Стоимость</div>
                    <div id="cost" class="value"></div>
                </div>
            </div>
            <div class="section">
                <div class="icon calendar-icon"></div>
                <div style="flex:1">
                    <div class="label">Дата покупки</div>
                    <div id="purchase_date" class="value"></div>
                </div>
            </div>
            <div class="section">
                <div class="icon clock-icon"></div>
                <div style="flex:1">
                    <div class="label">Время покупки:</div>
                    <div id="purchase_time" class="value"></div>
                </div>
            </div>
        </div>

        <!-- QR и кнопка без изменений -->
        <div id="content-control" class="content hidden">
            <div class="qr-screen">
                <p>Предъявите QR-код контролёру</p>
                <img id="qr-code" src="" alt="QR">
                <p style="margin-top:30px; color:#666;">Билет № <span id="qr-ticket-id"></span></p>
            </div>
        </div>
  
        <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
    </div>

    <script>
        // Твой скрипт (без изменений)
        const urlParams = new URLSearchParams(window.location.search);
        const TelegramWebApp = window.Telegram.WebApp;
        // ... (весь твой скрипт fillData, init и т.д.)
    </script>
</body>
</html>
