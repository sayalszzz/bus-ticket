<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Билет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family: Arial;
}

.container {
    max-width:480px;
    margin:auto;
}

/* Таймер */
.countdown {
    text-align:center;
    padding:14px;
    border-bottom:1px solid #111;
}

.countdown span {
    color:#ff3b3b;
    font-weight:bold;
}

/* Вкладки */
.tabs {
    display:flex;
}

.tab {
    flex:1;
    text-align:center;
    padding:14px;
    color:#888;
    position:relative;
}

.tab.active {
    color:#fff;
}

.tab.active::after {
    content:'';
    position:absolute;
    bottom:0;
    left:20%;
    right:20%;
    height:3px;
    background:#ff3b3b;
}

/* Контент */
.section {
    display:flex;
    gap:12px;
    padding:18px;
    border-bottom:1px solid #1a1a1a;
}

.label {
    color:#888;
    font-size:13px;
}

.value {
    font-size:16px;
}

.plate {
    font-size:18px;
    font-weight:bold;
}

/* QR */
.qr {
    text-align:center;
    padding:30px;
}

#qr {
    width:240px;
}

/* Кнопка */
.btn {
    margin:20px;
    background:#ff3b3b;
    padding:16px;
    text-align:center;
    border-radius:12px;
    font-weight:bold;
}
.hidden {display:none;}
</style>
</head>

<body>
<div class="container">

<div class="countdown">
Действует: <span id="sec">15</span> сек.
</div>

<div class="tabs">
<div class="tab active" id="t1">
<span id="ticket_id"></span>
</div>
<div class="tab" id="t2">Контроль</div>
</div>

<div id="c1">

<div class="section">
<div>
<div class="label">Перевозчик</div>
<div id="carrier" class="value"></div>
</div>
</div>

<div class="section">
<div>
<div id="address" class="value"></div>
<div id="plate" class="plate"></div>
</div>
</div>

<div class="section">
<div>
<div class="label">Стоимость</div>
<div id="cost" class="value"></div>
</div>
</div>

<div class="section">
<div>
<div class="label">Дата покупки</div>
<div id="date" class="value"></div>
</div>
</div>

<div class="section">
<div>
<div class="label">Время покупки</div>
<div id="time" class="value"></div>
</div>
</div>

</div>

<div id="c2" class="hidden">
<div class="qr">
<p>Покажите контролёру</p>
<img id="qr">
</div>
</div>

<div class="btn" onclick="Telegram.WebApp.close()">
ЗАКРЫТЬ
</div>

</div>

<script>
const p = new URLSearchParams(location.search);

// данные
const carrier = p.get("carrier") || "";
const address = p.get("address") || "";
const plate = p.get("plate") || "";
const price = p.get("total_price") || "0";
const count = p.get("count") || "1";
const id = p.get("ticket_id") || "";

document.getElementById("carrier").innerText = carrier;
document.getElementById("address").innerText = address.replace("60, ", "");
document.getElementById("plate").innerText = plate;
document.getElementById("cost").innerHTML = `${count} шт., Полный, <b>${price} ₽</b>`;
document.getElementById("date").innerText = p.get("purchase_date") || "";
document.getElementById("time").innerText = p.get("purchase_time") || "";
document.getElementById("ticket_id").innerText = id;

// таймер
let s = 15;
setInterval(()=>{
    s--;
    document.getElementById("sec").innerText = s;
},1000);

// QR
document.getElementById("qr").src =
`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${id}|${plate}`;

// вкладки
t1.onclick = ()=>{
    t1.classList.add("active");
    t2.classList.remove("active");
    c1.classList.remove("hidden");
    c2.classList.add("hidden");
}

t2.onclick = ()=>{
    t2.classList.add("active");
    t1.classList.remove("active");
    c2.classList.remove("hidden");
    c1.classList.add("hidden");
}

// Telegram init
Telegram.WebApp.ready();
Telegram.WebApp.expand();
</script>

</body>
</html>
