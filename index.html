<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городской транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
      
        /* Действует — убрал красный цвет и серую линию полностью */
        .countdown {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            padding: 14px 0;
            background: #000000;
            color: #ffffff;
        }
        .countdown span {
            color: #ffffff;
            font-weight: 700;
        }
        .tabs {
            display: flex;
            background: #000000;
            border-bottom: 1px solid #222222;
        }
        .tab {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #aaaaaa;
        }
        .tab.active {
            color: #ffffff;
            position: relative;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #ff3b3b;
        }
        .tab-number {
            color: #ff3b3b;
            font-weight: 600;
        }
        .content {
            padding: 0 16px;
            flex: 1;
        }
        .section {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #222222;
        }
        .section:last-child { border-bottom: none; }
        .icon {
            width: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .label {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 2px;
        }
        .value, .plate {
            font-size: 17px;
            font-weight: 500;
            color: #ffffff;
        }
        .plate {
            font-size: 18px;
            font-weight: 600;
            margin-top: 2px;
        }
        /* АДРЕС (Автовокзал Восточный - Петрушина и т.д.) — СЕРЫЙ как просил */
        #address {
            color: #aaaaaa;
        }
        /* Иконки — ТОЧНО как в твоей ПРОШЛОЙ версии + сделали тоньше (не жирные) */
        .carrier-icon svg,
        .bus-icon svg,
        .ruble-icon svg,
        .calendar-icon svg,
        .clock-icon svg {
            width: 28px;
            height: 28px;
            stroke: #ffffff;
            stroke-width: 1.5; /* ← сделал тоньше по твоей просьбе */
            fill: none;
        }
        .ruble-icon svg text {
            fill: #ffffff;
            stroke: none;
        }
        .qr-screen { text-align: center; padding: 40px 20px 20px; }
        #qr-code {
            width: 260px;
            height: 260px;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
        }
        .red-btn {
            background: #ff3b3b;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: 700;
            padding: 16px;
            border-radius: 12px;
            margin: 40px 16px 30px 16px;
            width: calc(100% - 32px);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="countdown">Действует: <span id="seconds">15</span> сек.</div>
      
        <div class="tabs">
            <!-- Таб "Билет" (документ красный) -->
            <div class="tab active" id="tab-ticket">
                <span class="icon ticket-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </span>
                <span id="control-number" class="tab-number"></span>
            </div>
            <!-- Таб "Контроль" — иконка как было в прошлой версии (простая, без глаз/улыбки/козырька) -->
            <div class="tab" id="tab-control">
                <span class="icon control-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Фуражка -->
                        <path d="M7 7 L17 7 L15 4.5 L9 4.5 Z"/>
                        <!-- Голова -->
                        <circle cx="12" cy="12.5" r="3.8"/>
                        <!-- Тело + плечи -->
                        <path d="M6.5 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                    </svg>
                </span>
                Контроль
            </div>
        </div>
        <div id="content-ticket" class="content">
            <!-- Перевозчик — иконка как было в прошлой версии (простая, не жирная) -->
            <div class="section">
                <div class="icon carrier-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Фуражка -->
                        <path d="M7 7 L17 7 L15 4.5 L9 4.5 Z"/>
                        <!-- Голова -->
                        <circle cx="12" cy="12.5" r="3.8"/>
                        <!-- Тело + плечи -->
                        <path d="M6.5 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Перевозчик</div>
                    <div class="value" id="carrier"></div>
                </div>
            </div>
            <!-- Автобус — новая иконка 1 в 1 как на твоей фотке -->
            <div class="section">
                <div class="icon bus-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="11" rx="2" ry="2"/>
                        <path d="M6 18v2"/>
                        <path d="M18 18v2"/>
                        <path d="M7 10h10"/>
                        <circle cx="7" cy="19" r="2"/>
                        <circle cx="17" cy="19" r="2"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div id="address" class="value"></div>
                    <div id="plate" class="plate"></div>
                </div>
            </div>
            <!-- Стоимость — ₽ 1 в 1 -->
            <div class="section">
                <div class="icon ruble-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <text x="12" y="19" text-anchor="middle" dominant-baseline="middle" font-size="23" font-weight="700" font-family="'Roboto', sans-serif">₽</text>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Стоимость</div>
                    <div id="cost" class="value"></div>
                </div>
            </div>
            <!-- Дата покупки -->
            <div class="section">
                <div class="icon calendar-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <path d="M16 2v4"/>
                        <path d="M8 2v4"/>
                        <path d="M3 10h18"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Дата покупки</div>
                    <div id="purchase_date" class="value"></div>
                </div>
            </div>
            <!-- Время покупки -->
            <div class="section">
                <div class="icon clock-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6.5"/>
                        <path d="M12 12.5 L15.5 15"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Время покупки</div>
                    <div id="purchase_time" class="value"></div>
                </div>
            </div>
        </div>
        <div id="content-control" class="content hidden">
            <div class="qr-screen">
                <p>Предъявите QR-код контролёру</p>
                <img id="qr-code" src="" alt="QR">
                <p style="margin-top:30px; color:#666;">Билет № <span id="qr-ticket-id"></span></p>
            </div>
        </div>
      
        <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TelegramWebApp = window.Telegram.WebApp;
      
        function fillData() {
            document.getElementById('carrier').textContent = urlParams.get('carrier') || 'ООО "СТК"';
          
            let addr = (urlParams.get('address') || 'ул Цимлянская - ст Красноярск-Северный').replace('60, ', '');
            document.getElementById('address').textContent = addr;
            document.getElementById('plate').textContent = urlParams.get('plate') || 'в583ск124';
          
            const count = urlParams.get('count') || '3';
            const price = urlParams.get('total_price') || '144.00';
            document.getElementById('cost').innerHTML = `${count} шт., Полный, <strong>${price} ₽</strong>`;
          
            document.getElementById('purchase_date').textContent = urlParams.get('purchase_date') || '10 января 2026 г.';
            document.getElementById('purchase_time').textContent = urlParams.get('purchase_time') || '20:35';
          
            const ticketId = urlParams.get('ticket_id') || '1 670 582 072';
            document.getElementById('control-number').textContent = ticketId;
            document.getElementById('qr-ticket-id').textContent = ticketId;
        }
        function startCountdown() {
            let seconds = 15;
            const el = document.getElementById('seconds');
            const timer = setInterval(() => {
                seconds--;
                el.textContent = seconds;
                if (seconds <= 0) clearInterval(timer);
            }, 1000);
        }
        function generateQR() {
            const ticketId = urlParams.get('ticket_id') || '1 670 582 072';
            const plate = urlParams.get('plate') || 'в583ск124';
            const data = ticketId + '|' + plate;
            document.getElementById('qr-code').src =
                `https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=000000&bgcolor=FFFFFF&data=${encodeURIComponent(data)}`;
        }
        function initTabs() {
            const t1 = document.getElementById('tab-ticket');
            const t2 = document.getElementById('tab-control');
            const c1 = document.getElementById('content-ticket');
            const c2 = document.getElementById('content-control');
          
            t1.addEventListener('click', () => {
                t1.classList.add('active');
                t2.classList.remove('active');
                c1.classList.remove('hidden');
                c2.classList.add('hidden');
            });
          
            t2.addEventListener('click', () => {
                t2.classList.add('active');
                t1.classList.remove('active');
                c2.classList.remove('hidden');
                c1.classList.add('hidden');
                generateQR();
            });
        }
        function init() {
            TelegramWebApp.ready();
            TelegramWebApp.expand();
            TelegramWebApp.setHeaderColor('#000000');
            TelegramWebApp.setBackgroundColor('#000000');
            fillData();
            startCountdown();
            initTabs();
        }
        window.onload = init;
    </script>
</body>
</html>
