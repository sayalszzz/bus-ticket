<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городской транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
      
        .countdown {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            padding: 14px 0;
            background: #000000;
            color: #ffffff;
        }
        .countdown span {
            color: #ffffff;
            font-weight: 700;
        }
        .tabs {
            display: flex;
            background: #000000;
            border-bottom: 1px solid #222222;
        }
        .tab {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #aaaaaa;
            position: relative;
        }
        .tab.active {
            color: #ff3b3b;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #ff3b3b;
        }
        .tab-number {
            font-weight: 600;
            color: #aaaaaa;
        }
        .tab.active .tab-number {
            color: #ff3b3b;
        }
        .content {
            padding: 0 16px;
            flex: 1;
        }
        .section {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #222222;
        }
        .section:last-child { border-bottom: none; }
        .icon {
            width: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .label {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 2px;
        }
        .value, .plate {
            font-size: 17px;
            font-weight: 500;
            color: #ffffff;
        }
        .plate {
            font-size: 18px;
            font-weight: 600;
            margin-top: 2px;
        }
        #address {
            color: #aaaaaa;
        }
        /* Общие стили для SVG */
        svg {
            width: 28px;
            height: 28px;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .carrier-icon svg, .tab svg {
            stroke: #ffffff;
        }
        .tab.active svg {
            stroke: #ff3b3b;
        }

        .ruble-icon svg text {
            fill: #ffffff;
            stroke: none !important;
            font-size: 24px;
            font-weight: 700;
        }

        .qr-screen { text-align: center; padding: 40px 20px 20px; }
        #qr-code {
            width: 260px;
            height: 260px;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
        }
        .red-btn {
            background: #ff3b3b;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: 700;
            padding: 16px;
            border-radius: 12px;
            margin: 40px 16px 30px 16px;
            width: calc(100% - 32px);
            cursor: pointer;
        }
        .hidden { display: none !important; }

        .expired-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .expired-icon { font-size: 64px; margin-bottom: 20px; }
        .expired-title { font-size: 22px; font-weight: 700; color: #ff3b3b; margin-bottom: 10px; }
        .expired-text { color: #aaaaaa; font-size: 16px; }
    </style>
</head>
<body>
    <div id="main-container" class="container">
        <div class="countdown">Действует: <span id="seconds">15</span> сек.</div>
      
        <div class="tabs">
            <div class="tab active" id="tab-ticket">
                <span class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </span>
                <span id="control-number" class="tab-number"></span>
            </div>
            <div class="tab" id="tab-control">
                <span class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M6 10H18L19 7C19 5 5 5 5 7L6 10Z" />
                        <path d="M12 6.5V8" stroke-width="2.5" />
                        <path d="M9 13C9 14.5 12 16 15 13" />
                        <path d="M4 20C4 17 8 16 12 18C16 16 20 17 20 20" />
                    </svg>
                </span>
                Контроль
            </div>
        </div>

        <div id="content-ticket" class="content">
            <div class="section">
                <div class="icon carrier-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff">
                        <path d="M6 10H18L19 7C19 5 5 5 5 7L6 10Z" />
                        <path d="M12 6.5V8" stroke-width="2.5" />
                        <path d="M9 13C9 14.5 12 16 15 13" />
                        <path d="M4 20C4 17 8 16 12 18C16 16 20 17 20 20" />
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Перевозчик</div>
                    <div class="value" id="carrier"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff">
                        <rect x="2" y="7" width="20" height="11" rx="2" ry="2"/>
                        <path d="M6 18v2"/><path d="M18 18v2"/><path d="M7 10h10"/>
                        <circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div id="address" class="value"></div>
                    <div id="plate" class="plate"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon ruble-icon">
                    <svg viewBox="0 0 24 24"><text x="12" y="18" text-anchor="middle" dominant-baseline="middle">₽</text></svg>
                </div>
                <div style="flex:1">
                    <div class="label">Стоимость</div>
                    <div id="cost" class="value"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/>
                        <rect x="7" y="14" width="6" height="5" fill="#ffffff" stroke="none" />
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Дата покупки</div>
                    <div id="purchase_date" class="value"></div>
                </div>
            </div>
            
            <div class="section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6.5L15 14"/>
                    </svg>
                </div>
                <div style="flex:1">
                    <div class="label">Время покупки</div>
                    <div id="purchase_time" class="value"></div>
                </div>
            </div>
        </div>

        <div id="content-control" class="content hidden">
            <div class="qr-screen">
                <p>Предъявите QR-код контролёру</p>
                <img id="qr-code" src="" alt="QR">
                <p style="margin-top:30px; color:#666;">Билет № <span id="qr-ticket-id"></span></p>
            </div>
        </div>
      
        <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TelegramWebApp = window.Telegram.WebApp;
      
        function checkExpiration() {
            const expireAt = urlParams.get('expire_at');
            if (expireAt) {
                const expireDate = new Date(expireAt);
                if (new Date() > expireDate) {
                    document.getElementById('main-container').innerHTML = `
                        <div class="expired-container">
                            <div class="expired-icon">⌛</div>
                            <div class="expired-title">Срок действия билета закончился</div>
                            <div class="expired-text">Билет был действителен до ${expireDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                            <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
                        </div>`;
                    return true;
                }
            }
            return false;
        }

        function fillData() {
            document.getElementById('carrier').textContent = urlParams.get('carrier') || 'ИП Цугленок М М';
            document.getElementById('address').textContent = (urlParams.get('address') || 'Автовокзал Восточный - Петрушина').replace('60, ', '');
            document.getElementById('plate').textContent = urlParams.get('plate') || 'е215тм124';
            document.getElementById('cost').innerHTML = `${urlParams.get('count') || '1'} шт., Полный, ${urlParams.get('total_price') || '48.00'} ₽`;
            document.getElementById('purchase_date').textContent = urlParams.get('purchase_date') || '15 апреля 2026 г.';
            document.getElementById('purchase_time').textContent = urlParams.get('purchase_time') || '12:00';
            const tid = urlParams.get('ticket_id') || '1 000 000 000';
            document.getElementById('control-number').textContent = tid;
            document.getElementById('qr-ticket-id').textContent = tid;
        }

        function startCountdown() {
            let s = 15;
            const el = document.getElementById('seconds');
            const timer = setInterval(() => {
                s--;
                if (el) el.textContent = s;
                if (s <= 0) clearInterval(timer);
            }, 1000);
        }

        function generateQR() {
            const data = (urlParams.get('ticket_id') || '1000000000') + '|' + (urlParams.get('plate') || 'е215тм124');
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data)}`;
        }

        function initTabs() {
            const t1 = document.getElementById('tab-ticket'), t2 = document.getElementById('tab-control');
            const c1 = document.getElementById('content-ticket'), c2 = document.getElementById('content-control');
            t1.onclick = () => { t1.classList.add('active'); t2.classList.remove('active'); c1.classList.remove('hidden'); c2.classList.add('hidden'); };
            t2.onclick = () => { t2.classList.add('active'); t1.classList.remove('active'); c2.classList.remove('hidden'); c1.classList.add('hidden'); generateQR(); };
        }

        window.onload = () => {
            TelegramWebApp.ready();
            TelegramWebApp.expand();
            TelegramWebApp.setHeaderColor('#000000');
            if (!checkExpiration()) { fillData(); startCountdown(); initTabs(); }
        };
    </script>
</body>
</html>
