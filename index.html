<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городской транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; background: #000; min-height: 100vh; }

        /* Таймер */
        .countdown {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            padding: 14px 0;
            background: #000000;
            color: #ffffff;
            border-bottom: 1px solid #222;
        }
        .countdown span { color: #ff3b3b; font-weight: 700; }

        /* Табы */
        .tabs {
            display: flex;
            background: #111111;
            border-bottom: 1px solid #222222;
        }
        .tab {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #aaaaaa;
        }
        .tab.active {
            color: #ffffff;
            position: relative;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #ff3b3b;
        }
        .tab-number { color: #ff3b3b; font-weight: 600; }

        /* Контент */
        .content {
            padding: 0 16px;
            flex: 1;
        }
        .section {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #222222;
        }
        .section:last-child { border-bottom: none; }
        .icon { font-size: 28px; width: 32px; flex-shrink: 0; }
        .label {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 2px;
        }
        .value, .plate {
            font-size: 17px;
            font-weight: 500;
            color: #ffffff;
        }
        .plate { font-size: 18px; font-weight: 600; margin-top: 2px; }

        /* QR */
        .qr-screen { text-align: center; padding: 40px 20px 20px; }
        #qr-code {
            width: 260px;
            height: 260px;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(255,59,59,0.2);
        }

        .red-btn {
            background: #ff3b3b;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: 700;
            padding: 16px;
            border-radius: 12px;
            margin: 20px 16px;
            width: calc(100% - 32px);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="countdown">Действует: <span id="seconds">15</span> сек.</div>

        <div class="tabs">
            <div class="tab active" id="tab-ticket">
                <span class="icon">📄</span>
                <span id="control-number" class="tab-number"></span>
            </div>
            <div class="tab" id="tab-control">
                <span class="icon">👤</span>
                Контроль
            </div>
        </div>

        <div id="content-ticket" class="content">
            <div class="section">
                <div class="icon">👮</div>
                <div style="flex:1">
                    <div class="label">Перевозчик</div>
                    <div class="value" id="carrier"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">🚌</div>
                <div style="flex:1">
                    <div id="address" class="value"></div>
                    <div id="plate" class="plate"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">₽</div>
                <div style="flex:1">
                    <div class="label">Стоимость</div>
                    <div id="cost" class="value"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">📅</div>
                <div style="flex:1">
                    <div class="label">Дата покупки</div>
                    <div id="purchase_date" class="value"></div>
                </div>
            </div>

            <div class="section">
                <div class="icon">🕒</div>
                <div style="flex:1">
                    <div class="label">Время покупки</div>
                    <div id="purchase_time" class="value"></div>
                </div>
            </div>
        </div>

        <div id="content-control" class="content hidden">
            <div class="qr-screen">
                <p>Предъявите QR-код контролёру</p>
                <img id="qr-code" src="" alt="QR">
                <p style="margin-top:30px; color:#666;">Билет № <span id="qr-ticket-id"></span></p>
            </div>
        </div>

        <button onclick="Telegram.WebApp.close()" class="red-btn">ЗАКРЫТЬ</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TelegramWebApp = window.Telegram.WebApp;

        function fillData() {
            document.getElementById('carrier').textContent = urlParams.get('carrier') || 'ООО "СТК"';
            let addr = urlParams.get('address') || '';
            addr = addr.replace('60, ', '');           // убираем "60," как на скрине
            document.getElementById('address').textContent = addr;
            document.getElementById('plate').textContent = urlParams.get('plate') || '';
            const count = urlParams.get('count') || '3';
            const price = urlParams.get('total_price') || '144.00';
            document.getElementById('cost').innerHTML = `${count} шт., Полный, <strong>${price} ₽</strong>`;
            document.getElementById('purchase_date').textContent = urlParams.get('purchase_date') || '';
            document.getElementById('purchase_time').textContent = urlParams.get('purchase_time') || '';
            const ticketId = urlParams.get('ticket_id') || '';
            document.getElementById('control-number').textContent = ticketId;
            document.getElementById('qr-ticket-id').textContent = ticketId;
        }

        // Таймер 15→0 при каждом открытии
        function startCountdown() {
            let seconds = 15;
            const el = document.getElementById('seconds');
            const timer = setInterval(() => {
                seconds--;
                el.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(timer);
                    el.textContent = '0';
                }
            }, 1000);
        }

        function generateQR() {
            const ticketId = urlParams.get('ticket_id') || '';
            const data = ticketId + '|' + urlParams.get('plate');
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=000000&bgcolor=FFFFFF&data=${encodeURIComponent(data)}`;
            document.getElementById('qr-code').src = url;
        }

        function initTabs() {
            const t1 = document.getElementById('tab-ticket');
            const t2 = document.getElementById('tab-control');
            const c1 = document.getElementById('content-ticket');
            const c2 = document.getElementById('content-control');

            t1.addEventListener('click', () => {
                t1.classList.add('active'); t2.classList.remove('active');
                c1.classList.remove('hidden'); c2.classList.add('hidden');
            });
            t2.addEventListener('click', () => {
                t2.classList.add('active'); t1.classList.remove('active');
                c2.classList.remove('hidden'); c1.classList.add('hidden');
                generateQR();
            });
        }

        function init() {
            TelegramWebApp.ready();
            TelegramWebApp.expand();
            TelegramWebApp.setHeaderColor('#000000');
            TelegramWebApp.setBackgroundColor('#000000');
            fillData();
            startCountdown();
            initTabs();
        }

        window.onload = init;
    </script>
</body>
</html>
